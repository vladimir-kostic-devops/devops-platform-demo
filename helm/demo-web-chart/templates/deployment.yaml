apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}
  labels:
{{ toYaml .Values.global.labels | indent 4 }}

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
{{ toYaml .Values.global.labels | indent 6 }}

  template:
    metadata:
      labels:
{{ toYaml .Values.global.labels | indent 8 }}

    spec:
      containers:
        - name: {{ .Chart.Name }}

          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - name: http
              containerPort: 80
              protocol: TCP

          {{- if .Values.global.securityContext.enabled }}
          securityContext:
            runAsNonRoot: {{ .Values.global.securityContext.runAsNonRoot }}
            runAsUser: {{ .Values.global.securityContext.runAsUser }}
          {{- end }}

          {{- if .Values.probes.liveness.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          {{- end }}

          {{- if .Values.probes.readiness.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          {{- end }}

          resources:
{{- toYaml (index .Values.resourceProfiles .Values.resources.profile) | nindent 12 }}
